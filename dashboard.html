document.getElementById('statTotal').textContent = d.stocks.length;

var sNames = d.sectors.map(function(s){return s.name;});
function bo(){return{responsive:true,maintainAspectRatio:false,indexAxis:'y',plugins:{legend:{display:false}},scales:{x:{grid:{color:'#333'},ticks:{color:'#888',font:{size:10}}},y:{grid:{display:false},ticks:{color:'#aaa',font:{size:11}}}}};}

new Chart(document.getElementById('chartVolumeRatio'),{type:'bar',options:bo(),data:{labels:sNames,datasets:[{label:'量比',data:d.sectors.map(function(s){return s.avg_volume_ratio;}),backgroundColor:d.sectors.map(function(s){return s.avg_volume_ratio>1.1?'rgba(63,162,102,.6)':'rgba(120,130,140,.4)';})}]}});

new Chart(document.getElementById('chartMoneyFlow'),{type:'bar',options:bo(),data:{labels:sNames,datasets:[{label:'净流入(亿)',data:d.sectors.map(function(s){return s.net_mf/1e4;}),backgroundColor:d.sectors.map(function(s){return s.net_mf>=0?'rgba(240,64,64,.6)':'rgba(90,160,220,.5)';})}]}});

new Chart(document.getElementById('chartPct20d'),{type:'bar',options:bo(),data:{labels:sNames,datasets:[{label:'20日%',data:d.sectors.map(function(s){return s.avg_pct_20d;}),backgroundColor:d.sectors.map(function(s){return s.avg_pct_20d>=0?'rgba(63,162,102,.6)':'rgba(207,75,75,.5)';})}]}});

document.getElementById('tableSector').innerHTML='<thead><tr><th>板块</th><th>量比</th><th>量趋势</th><th>主力(亿)</th><th>今日%</th><th>5日%</th><th>20日%</th><th>趋势</th></tr></thead><tbody>'+d.sectors.map(function(s){var hot=s.status==='过热'?'<span class="pill pill-hot">过热</span> ':'';return'<tr><td>'+hot+s.name+'</td><td>'+s.avg_volume_ratio.toFixed(2)+'</td><td style="color:'+(s.vol_trend==='缩量'?'#cf4b4b':'#aaa')+'">'+s.vol_trend+'</td><td class="'+(s.net_mf>=0?'pct-up':'pct-down')+'">'+(s.net_mf/1e4).toFixed(2)+'</td><td class="'+(s.avg_pct>=0?'pct-up':'pct-down')+'">'+(s.avg_pct>=0?'+':'')+s.avg_pct.toFixed(2)+'%</td><td class="'+(s.avg_pct_5d>=0?'pct-up':'pct-down')+'">'+(s.avg_pct_5d>=0?'+':'')+s.avg_pct_5d.toFixed(2)+'%</td><td class="'+(s.avg_pct_20d>=0?'pct-up':'pct-down')+'">'+(s.avg_pct_20d>=0?'+':'')+s.avg_pct_20d.toFixed(2)+'%</td><td>'+s.uptrend_count+'↑'+s.downtrend_count+'↓</td></tr>';}).join('')+'</tbody>';

function stockTable(verdict){
  var list = d.stocks.filter(function(s){return s.verdict===verdict;});
  if(!list.length) return '<div style="text-align:center;padding:20px;color:#666;font-size:13px">无符合条件的标的</div>';
  return '<table><thead><tr><th>标的</th><th>板块</th><th>今日%</th><th>量比</th><th>20日%</th><th>得分/信号</th></tr></thead><tbody>'+list.map(function(s){
    var c = s.code.split('.')[0];
    var pill = s.verdict==='可上车'?'<span class="pill pill-board">上车</span>':s.verdict==='可关注'?'<span class="pill pill-watch">关注</span>':'';
    return '<tr><td><span class="code">'+c+'</span><span class="name">'+s.name+'</span></td><td style="color:#aaa">'+s.sector+'</td><td class="'+(s.pct_chg>=0?'pct-up':'pct-down')+'">'+(s.pct_chg>=0?'+':'')+s.pct_chg.toFixed(2)+'%</td><td>'+s.volume_ratio.toFixed(2)+'</td><td class="'+(s.pct_20d>=0?'pct-up':'pct-down')+'">'+(s.pct_20d>=0?'+':'')+s.pct_20d.toFixed(1)+'%</td><td><div class="verdict-cell"><span class="score">'+s.score+'</span>'+pill+'</div></td></tr>';
  }).join('')+'</tbody></table>';
}

document.getElementById('tableStock').innerHTML = stockTable('可上车');
document.querySelectorAll('.tab').forEach(function(t){
  t.addEventListener('click',function(){
    document.querySelectorAll('.tab').forEach(function(x){x.classList.remove('active');});
    t.classList.add('active');
    var v = {board:'可上车',watch:'可关注',wait:'观望'}[t.dataset.tab];
    document.getElementById('tableStock').innerHTML = stockTable(v);
  });
});
})();
</script>
</body>
</html>
